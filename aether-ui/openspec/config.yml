schema: spec-driven

# Project context (optional)
# This is shown to AI when creating artifacts.
project_context:
  - path: "docs/spec/AetherAPI 前端技术栈与开发规范文档.md"
    description: "AetherAPI 前端统一技术栈、目录结构、编码约定与 AI 协作规范文档。Agent 在进行任何前端代码生成或方案设计前，必须先读取该文档，确保实现方式与团队基线一致。"
  - path: "aether-ui/*/DESIGN.md"
    description: "前端各应用的项目级视觉与交互设计约束文档。涉及页面结构、样式、组件外观、品牌表达或动效实现时，必须优先参考对应应用的 DESIGN.md，并以其作为样式细节的直接依据。"
  - path: "docs/design/**/*.md"
    description: "系统级架构与业务背景文档。用于帮助 Agent 理解前端所服务的整体产品结构、模块边界与上下游依赖，避免前端方案偏离全局设计。"

# Per-artifact rules (optional)
rules:
  - "全局红线：项目的 `docs/` 目录是业务规则、接口契约与架构设计的权威来源；前端各应用目录下的 `DESIGN.md` 是视觉与交互实现的权威来源。Agent 严禁在没有 `docs/api/*.yaml`、相关规范文档或目标应用 `DESIGN.md` 支撑的情况下，凭空捏造接口字段、页面行为、视觉风格或交互规则。"
  - "需求探索 (Explore) 约束：在与用户讨论前端需求、页面结构、交互流程或信息架构时，Agent 必须主动交叉检索 `docs/spec/AetherAPI 前端技术栈与开发规范文档.md`、目标应用的 `DESIGN.md`、`docs/api/` 中的接口定义，以及必要的 `docs/design/` 架构文档，确认新需求与既有技术栈、布局约定、鉴权模式、接口能力和视觉风格兼容，并指出潜在冲突。"
  - "提案生成 (Propose) 约束：当基于需求生成 `tasks.md` 时，如果需求涉及新增或修改接口调用、字段结构、鉴权流程、跨应用共享组件规范或全局视觉/交互约定，Agent 必须优先安排【确认并更新 `docs/api/*.yaml` 中的接口契约】以及【更新 `docs/spec/AetherAPI 前端技术栈与开发规范文档.md` 或对应应用 `DESIGN.md` 中受影响的规范】。在这些顶层文档完成同步前，不应直接推进具体页面或业务代码实现任务。"
  - "代码开发 (Apply) 约束：在开始编写前端代码之前，Agent 必须先阅读并严格遵守 `docs/spec/AetherAPI 前端技术栈与开发规范文档.md` 与目标应用的 `DESIGN.md`。生成的代码必须遵循 `Vue 3 + TypeScript + Vite`、Composition API、`<script setup lang=\"ts\">`、Tailwind CSS、`shadcn-vue`、Pinia、统一 API 层与 i18n 规则；禁止在页面组件中直接写裸请求、禁止硬编码环境地址或用户可见文案、禁止在模板中内嵌 SVG 图标、禁止绕过项目级设计约束自由发挥。"
