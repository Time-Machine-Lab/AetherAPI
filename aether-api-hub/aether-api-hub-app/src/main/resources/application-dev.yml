aether:
  console:
    session-auth:
      user-id: ${AETHER_CONSOLE_AUTH_USER_ID:console-operator}
      login-name: ${AETHER_CONSOLE_AUTH_LOGIN_NAME:console@aetherapi.local}
      password: ${AETHER_CONSOLE_AUTH_PASSWORD:change-me-console-password}
      display-name: ${AETHER_CONSOLE_AUTH_DISPLAY_NAME:Aether Console Operator}
      email: ${AETHER_CONSOLE_AUTH_EMAIL:console@aetherapi.local}
      role: ${AETHER_CONSOLE_AUTH_ROLE:OWNER}
      token-secret: ${AETHER_CONSOLE_AUTH_TOKEN_SECRET:change-me-console-session-secret}
      token-ttl-seconds: ${AETHER_CONSOLE_AUTH_TOKEN_TTL_SECONDS:43200}
  import-agent:
    stream:
      timeout-seconds: ${AETHER_IMPORT_AGENT_STREAM_TIMEOUT_SECONDS:180}
    llm:
      enabled: ${AETHER_IMPORT_AGENT_LLM_ENABLED:true}
      base-url: ${AETHER_IMPORT_AGENT_LLM_BASE_URL:https://api.deepseek.com}
      endpoint-path: ${AETHER_IMPORT_AGENT_LLM_ENDPOINT_PATH:/chat/completions}
      api-key: ${AETHER_IMPORT_AGENT_LLM_API_KEY:sk-b377a81b84534cda9edb7fbee12f4a4c}
      model: ${AETHER_IMPORT_AGENT_LLM_MODEL:deepseek-v4-flash}
      temperature: ${AETHER_IMPORT_AGENT_LLM_TEMPERATURE:0.2}
      max-completion-tokens: ${AETHER_IMPORT_AGENT_LLM_MAX_COMPLETION_TOKENS:128000}
      request-timeout-seconds: ${AETHER_IMPORT_AGENT_LLM_REQUEST_TIMEOUT_SECONDS:600}
      tool-calling-enabled: ${AETHER_IMPORT_AGENT_LLM_TOOL_CALLING_ENABLED:false}
      system-prompt: ${AETHER_IMPORT_AGENT_LLM_SYSTEM_PROMPT:}
