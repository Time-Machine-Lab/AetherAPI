schema: spec-driven

# Project context (optional)
# This is shown to AI when creating artifacts.
# Add your tech stack, conventions, style guides, domain knowledge, etc.
# Example:
#   context: |
#     Tech stack: TypeScript, React, Node.js
#     We use conventional commits
#     Domain: e-commerce platform
project_context:
  - path: "../docs/design/aehter-api-hub/*.md"
    description: "顶层架构设计文档。包含了项目的核心知识、技术选型和整体架构。供 Agent 在需求探索和代码编写时参考，确保不偏离整体架构。(注：具体的领域设计 domain/* 由开发者视需求自行挂载)"
  - path: "../docs/spec/Aether API HUB 后端代码开发规范文档.md"
    description: "开发规约与技术栈约束文档。包含了前端、后端等具体的代码编写规范。Agent 在进行任何代码生成（Apply 阶段）前，必须读取此上下文以确保代码风格合规。"

# Per-artifact rules (optional)
# Add custom rules for specific artifacts.
# Example:
#   rules:
#     proposal:
#       - Keep proposals under 500 words
#       - Always include a "Non-goals" section
#     tasks:
#       - Break tasks into chunks of max 2 hours
rules:
  proposal:
    - "项目的 `docs/` 目录是唯一的绝对真理（Single Source of Truth）。在 proposal 中不得脱离 `docs/design/`、`docs/api/`、`docs/sql/` 凭空创造接口或数据结构。"
    - "在形成 proposal 前，必须主动比对 `docs/design/`、`docs/api/`、`docs/sql/` 的现状，确保提案与现有架构兼容，并点出潜在边界冲突。"
    - "如果 proposal 已经识别出后续需要新增或更新 `docs/sql/`、`docs/api/` 下的顶层文件，必须在提案中明确这些文件属于权威设计产物，并要求后续生成时使用 `tml-docs-spec-generate` 技能；其中 `docs/sql/` 文件必须使用 SQL 生成模板，`docs/api/` 文件必须使用 API 生成模板。"
  design:
    - "项目的 `docs/` 目录是唯一的绝对真理（Single Source of Truth）。design 必须围绕现有架构文档展开，不得写出未被顶层文档支撑的数据库或 API 事实。"
    - "design 必须遵守 Aether API HUB 的模块边界与 DDD 分层约束，避免把业务规则塞进 adapter 或 infrastructure。"
    - "凡是 design 涉及新增或修改 `docs/sql/`、`docs/api/` 顶层文件时，都必须注明这些文档要通过 `tml-docs-spec-generate` 技能生成；`docs/sql/` 使用 SQL 生成模板，`docs/api/` 使用 API 生成模板。"
  specs:
    - "项目的 `docs/` 目录是唯一的绝对真理（Single Source of Truth）。specs 中的行为要求必须能回溯到 `docs/design/` 的领域语义，并为后续 `docs/api/`、`docs/sql/` 落地留出明确边界。"
    - "如果 specs 导致需要更新 `docs/sql/` 或 `docs/api` 顶层文档，对应文档生成必须使用 `tml-docs-spec-generate` 技能；`docs/sql/` 使用 SQL 生成模板，`docs/api/` 使用 API 生成模板。"
  tasks:
    - "当需求涉及任何数据存储变更（新增表/改字段）或接口变更（新增接口/改参数）时，必须将【更新或创建对应的 `.sql` 文件到 `docs/sql/`】以及【更新或创建对应的 `.yaml` 文件到 `docs/api/`】列为最高优先级的首要任务；在这些顶层设计文档更新完成前，不得安排业务代码开发任务。"
    - "开始代码实现前，必须先阅读并遵守 `docs/spec/` 的开发规范；所有涉及数据库交互或 API 调用的实现，都必须与 `docs/sql/` 和 `docs/api/` 100% 对齐。"
    - "凡是任务要求生成或更新 `docs/sql/`、`docs/api/` 下的顶层文件，执行时必须使用 `tml-docs-spec-generate` 技能；生成 `docs/sql/` 文件时必须使用 SQL 生成模板，生成 `docs/api/` 文件时必须使用 API 生成模板。"
