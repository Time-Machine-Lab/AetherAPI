openapi: 3.0.3
info:
  title: API Catalog Discovery API
  version: 1.0.0
  description: |
    API 市场只读发现接口。
    对应控制器：CatalogDiscoveryController.java
    只返回已发布且未删除的资产，不暴露写模型内部敏感配置。
servers:
  - url: /api/v1
    description: Aether API Hub v1

tags:
  - name: Discovery
    description: API 市场发现

paths:
  /discovery/assets:
    get:
      summary: 查询市场已发布资产列表
      operationId: listDiscoveryAssets
      tags:
        - Discovery
      responses:
        '200':
          description: 已发布资产列表
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CatalogDiscoveryListResp'

  /discovery/assets/{apiCode}:
    get:
      summary: 查询市场已发布资产详情
      operationId: getDiscoveryAssetDetail
      tags:
        - Discovery
      parameters:
        - name: apiCode
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: 已发布资产详情
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CatalogDiscoveryAssetDetailResp'
        '400':
          description: API Code 非法
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResp'
              example:
                code: API_CODE_INVALID
                message: Invalid asset request parameters
        '404':
          description: 资产不存在、未发布或已删除
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResp'

components:
  schemas:
    CatalogDiscoveryListResp:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/CatalogDiscoveryAssetSummaryResp'

    CatalogDiscoveryAssetSummaryResp:
      type: object
      properties:
        apiCode:
          type: string
          example: weather-forecast
        assetName:
          type: string
          nullable: true
        assetType:
          type: string
          enum:
            - STANDARD_API
            - AI_API
        category:
          $ref: '#/components/schemas/CatalogDiscoveryCategoryResp'
        publisher:
          $ref: '#/components/schemas/CatalogDiscoveryPublisherResp'
        publishedAt:
          type: string
          format: date-time
          nullable: true

    CatalogDiscoveryCategoryResp:
      type: object
      nullable: true
      properties:
        categoryCode:
          type: string
          nullable: true
        categoryName:
          type: string
          nullable: true

    CatalogDiscoveryPublisherResp:
      type: object
      nullable: true
      properties:
        displayName:
          type: string
          nullable: true

    CatalogDiscoveryAssetDetailResp:
      type: object
      properties:
        apiCode:
          type: string
        assetName:
          type: string
          nullable: true
        assetType:
          type: string
          enum:
            - STANDARD_API
            - AI_API
        category:
          $ref: '#/components/schemas/CatalogDiscoveryCategoryResp'
        publisher:
          $ref: '#/components/schemas/CatalogDiscoveryPublisherResp'
        publishedAt:
          type: string
          format: date-time
          nullable: true
        requestMethod:
          type: string
          enum:
            - GET
            - POST
            - PUT
            - PATCH
            - DELETE
          nullable: true
        authScheme:
          type: string
          enum:
            - NONE
            - HEADER_TOKEN
            - QUERY_TOKEN
          nullable: true
        requestTemplate:
          type: string
          nullable: true
        exampleSnapshot:
          $ref: '#/components/schemas/CatalogDiscoveryExampleSnapshotResp'
        aiCapabilityProfile:
          $ref: '#/components/schemas/CatalogDiscoveryAiCapabilityProfileResp'

    CatalogDiscoveryExampleSnapshotResp:
      type: object
      nullable: true
      properties:
        requestExample:
          type: string
          nullable: true
        responseExample:
          type: string
          nullable: true

    CatalogDiscoveryAiCapabilityProfileResp:
      type: object
      nullable: true
      properties:
        provider:
          type: string
        model:
          type: string
        streamingSupported:
          type: boolean
        capabilityTags:
          type: array
          items:
            type: string

    ErrorResp:
      type: object
      properties:
        code:
          type: string
        message:
          type: string
