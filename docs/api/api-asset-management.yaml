openapi: 3.0.3
info:
  title: API Asset Management API
  version: 1.0.0
  description: |
    当前用户 API 资产工作台接口。
    对应控制器：ApiAssetController.java
    该接口族只服务当前登录用户自己的资产管理，不提供跨用户的全局管理能力。
servers:
  - url: /api/v1
    description: Aether API Hub v1

tags:
  - name: CurrentUserAssets
    description: 当前用户资产工作台

paths:
  /current-user/assets:
    get:
      summary: 查询当前用户资产列表
      operationId: listAssets
      tags:
        - CurrentUserAssets
      parameters:
        - name: status
          in: query
          required: false
          description: 资产状态过滤
          schema:
            type: string
            enum:
              - DRAFT
              - PUBLISHED
              - UNPUBLISHED
        - name: categoryCode
          in: query
          required: false
          description: 分类编码过滤
          schema:
            type: string
            maxLength: 64
        - name: keyword
          in: query
          required: false
          description: 关键字过滤，匹配 apiCode 或 assetName
          schema:
            type: string
            maxLength: 128
        - name: page
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            default: 1
        - name: size
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
      responses:
        '200':
          description: 当前用户资产分页结果
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiAssetPageResp'
        '400':
          description: 查询参数非法
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResp'
              example:
                code: ASSET_INVALID_QUERY
                message: Invalid asset list query parameters
    post:
      summary: 创建当前用户资产草稿
      operationId: registerAsset
      tags:
        - CurrentUserAssets
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterApiAssetReq'
      responses:
        '201':
          description: 资产草稿创建成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiAssetResp'
        '400':
          description: 请求参数非法
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResp'
        '409':
          description: API Code 已存在
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResp'

  /current-user/assets/{apiCode}:
    get:
      summary: 查询当前用户资产详情
      operationId: getAssetByCode
      tags:
        - CurrentUserAssets
      parameters:
        - name: apiCode
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: 当前用户资产详情
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiAssetResp'
        '400':
          description: 路径参数非法
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResp'
              example:
                code: API_CODE_INVALID
                message: Invalid asset request parameters
        '404':
          description: 资产不存在或不属于当前用户
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResp'
    put:
      summary: 修改当前用户资产
      operationId: reviseAsset
      tags:
        - CurrentUserAssets
      parameters:
        - name: apiCode
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ReviseApiAssetReq'
      responses:
        '200':
          description: 资产修改成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiAssetResp'
        '400':
          description: 请求参数非法
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResp'
        '404':
          description: 资产不存在或不属于当前用户
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResp'
    delete:
      summary: 删除当前用户资产
      operationId: deleteAsset
      tags:
        - CurrentUserAssets
      parameters:
        - name: apiCode
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: 资产删除成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiAssetResp'
        '404':
          description: 资产不存在或不属于当前用户
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResp'

  /current-user/assets/{apiCode}/publish:
    patch:
      summary: 发布当前用户资产
      operationId: publishAsset
      tags:
        - CurrentUserAssets
      parameters:
        - name: apiCode
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: 发布成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiAssetResp'
        '400':
          description: 发布校验失败
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResp'
        '404':
          description: 资产不存在或不属于当前用户
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResp'

  /current-user/assets/{apiCode}/unpublish:
    patch:
      summary: 下架当前用户资产
      operationId: unpublishAsset
      tags:
        - CurrentUserAssets
      parameters:
        - name: apiCode
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: 下架成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiAssetResp'
        '404':
          description: 资产不存在或不属于当前用户
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResp'

  /current-user/assets/{apiCode}/ai-profile:
    put:
      summary: 维护当前用户 AI 资产能力档案
      operationId: attachAiCapabilityProfile
      tags:
        - CurrentUserAssets
      parameters:
        - name: apiCode
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AttachAiCapabilityProfileReq'
      responses:
        '200':
          description: AI 能力档案维护成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiAssetResp'
        '400':
          description: 资产类型不支持或请求参数非法
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResp'
        '404':
          description: 资产不存在或不属于当前用户
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResp'

components:
  schemas:
    RegisterApiAssetReq:
      type: object
      required:
        - apiCode
        - assetType
      properties:
        apiCode:
          type: string
          minLength: 1
          maxLength: 64
          example: weather-forecast
        assetType:
          type: string
          enum:
            - STANDARD_API
            - AI_API
        assetName:
          type: string
          minLength: 1
          maxLength: 128
          nullable: true
          example: Weather Forecast API

    ReviseApiAssetReq:
      type: object
      properties:
        assetName:
          type: string
          minLength: 1
          maxLength: 128
          nullable: true
        assetType:
          type: string
          enum:
            - STANDARD_API
            - AI_API
        categoryCode:
          type: string
          minLength: 1
          maxLength: 64
          nullable: true
        requestMethod:
          type: string
          enum:
            - GET
            - POST
            - PUT
            - PATCH
            - DELETE
          nullable: true
        upstreamUrl:
          type: string
          maxLength: 512
          nullable: true
        authScheme:
          type: string
          enum:
            - NONE
            - HEADER_TOKEN
            - QUERY_TOKEN
          nullable: true
        authConfig:
          type: string
          nullable: true
        requestTemplate:
          type: string
          nullable: true
        requestExample:
          type: string
          nullable: true
        responseExample:
          type: string
          nullable: true

    AttachAiCapabilityProfileReq:
      type: object
      required:
        - provider
        - model
        - streamingSupported
        - capabilityTags
      properties:
        provider:
          type: string
          minLength: 1
          maxLength: 128
        model:
          type: string
          minLength: 1
          maxLength: 128
        streamingSupported:
          type: boolean
        capabilityTags:
          type: array
          minItems: 1
          items:
            type: string

    AiCapabilityProfileResp:
      type: object
      nullable: true
      properties:
        provider:
          type: string
        model:
          type: string
        streamingSupported:
          type: boolean
        capabilityTags:
          type: array
          items:
            type: string

    ApiAssetSummaryResp:
      type: object
      properties:
        apiCode:
          type: string
        assetName:
          type: string
          nullable: true
        assetType:
          type: string
          enum:
            - STANDARD_API
            - AI_API
        categoryCode:
          type: string
          nullable: true
        categoryName:
          type: string
          nullable: true
        status:
          type: string
          enum:
            - DRAFT
            - PUBLISHED
            - UNPUBLISHED
        publisherDisplayName:
          type: string
          nullable: true
        publishedAt:
          type: string
          format: date-time
          nullable: true
        updatedAt:
          type: string
          format: date-time

    ApiAssetPageResp:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/ApiAssetSummaryResp'
        page:
          type: integer
        size:
          type: integer
        total:
          type: integer
          format: int64

    ApiAssetResp:
      type: object
      properties:
        id:
          type: string
          format: uuid
        apiCode:
          type: string
        assetName:
          type: string
          nullable: true
        assetType:
          type: string
          enum:
            - STANDARD_API
            - AI_API
        categoryCode:
          type: string
          nullable: true
        status:
          type: string
          enum:
            - DRAFT
            - PUBLISHED
            - UNPUBLISHED
        publisherDisplayName:
          type: string
          nullable: true
        publishedAt:
          type: string
          format: date-time
          nullable: true
        requestMethod:
          type: string
          nullable: true
        upstreamUrl:
          type: string
          nullable: true
        authScheme:
          type: string
          nullable: true
        authConfig:
          type: string
          nullable: true
        requestTemplate:
          type: string
          nullable: true
        requestExample:
          type: string
          nullable: true
        responseExample:
          type: string
          nullable: true
        aiCapabilityProfile:
          $ref: '#/components/schemas/AiCapabilityProfileResp'
        deleted:
          type: boolean
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    ErrorResp:
      type: object
      properties:
        code:
          type: string
        message:
          type: string
