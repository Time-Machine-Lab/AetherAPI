openapi: 3.0.3
info:
  title: API Import Agent API
  version: 1.0.0
  description: |
    当前用户 API Import Agent 会话与执行接口。
    对应控制器：ApiImportAgentController.java
    该接口族只服务当前登录用户自己的导入会话，不提供跨用户会话访问能力。
servers:
  - url: /api/v1
    description: Aether API Hub v1

tags:
  - name: CurrentUserImportAgent
    description: 当前用户 API Import Agent

paths:
  /current-user/import-agent/sessions:
    post:
      summary: 创建当前用户导入会话
      operationId: createImportSession
      tags:
        - CurrentUserImportAgent
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateImportAgentSessionReq'
      responses:
        '201':
          description: 导入会话创建成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiImportAgentSessionResp'
        '400':
          description: 请求参数非法
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResp'

  /current-user/import-agent/sessions/stream:
    post:
      summary: 以流式事件创建当前用户导入会话
      operationId: createImportSessionStream
      tags:
        - CurrentUserImportAgent
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateImportAgentSessionReq'
      responses:
        '200':
          description: 以 Server-Sent Events 返回导入计划阶段、消息增量和最终会话快照
          content:
            text/event-stream:
              schema:
                type: string
              examples:
                createSessionStream:
                  summary: 流式创建会话事件序列
                  value: |
                    event: status
                    data: {"phase":"planning","message":"Planning the import conversation."}

                    event: message
                    data: {"actorType":"AGENT","delta":"I need one more detail about the upstream auth."}

                    event: session
                    data: {"sessionId":"session-001","status":"WAITING_FOR_CLARIFICATION","documentSource":"https://docs.example.com/openapi.yaml","documentSummary":"OpenAPI summary","importIntent":"Import weather API","publisherDisplayName":"Console Operator","currentPlanVersion":1,"confirmedPlanVersion":null,"latestRunId":null,"currentPlan":{"version":1,"executable":false,"summary":"Import weather API into the tools category.","clarificationQuestions":["鉴权方式 (authScheme): 请选择调用上游时使用的鉴权方式。"],"clarificationItems":[{"id":"plan-1:/assetPlans/0/authScheme:authScheme","targetPath":"/assetPlans/0/authScheme","fieldKey":"authScheme","label":"鉴权方式","description":"请选择调用上游时使用的鉴权方式。","inputType":"SELECT","required":true,"options":[{"value":"NONE","label":"NONE"},{"value":"HEADER_TOKEN","label":"HEADER_TOKEN"}],"currentValue":null}],"categoryPlans":[],"assetPlans":[]},"turns":[{"turnId":"turn-001","actorType":"USER","message":"Import weather API","planVersion":null,"createdAt":"2026-05-18T12:00:00Z"},{"turnId":"turn-002","actorType":"AGENT","message":"请补充调用上游时使用的鉴权方式。","planVersion":1,"createdAt":"2026-05-18T12:00:01Z"}],"createdAt":"2026-05-18T12:00:00Z","updatedAt":"2026-05-18T12:00:01Z"}

                    event: done
                    data: {"phase":"completed"}
        '400':
          description: 请求参数非法
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResp'

  /current-user/import-agent/sessions/{sessionId}:
    get:
      summary: 查询当前用户导入会话详情
      operationId: getImportSession
      tags:
        - CurrentUserImportAgent
      parameters:
        - name: sessionId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: 导入会话详情
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiImportAgentSessionResp'
        '404':
          description: 会话不存在或不属于当前用户
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResp'

  /current-user/import-agent/sessions/{sessionId}/turns:
    post:
      summary: 追加当前用户导入会话轮次
      operationId: appendImportSessionTurn
      tags:
        - CurrentUserImportAgent
      parameters:
        - name: sessionId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AppendImportAgentTurnReq'
      responses:
        '200':
          description: 轮次追加成功，并返回刷新后的会话详情
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiImportAgentSessionResp'
        '404':
          description: 会话不存在或不属于当前用户
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResp'

  /current-user/import-agent/sessions/{sessionId}/turns/stream:
    post:
      summary: 以流式事件追加当前用户导入会话轮次
      operationId: appendImportSessionTurnStream
      tags:
        - CurrentUserImportAgent
      parameters:
        - name: sessionId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AppendImportAgentTurnReq'
      responses:
        '200':
          description: 以 Server-Sent Events 返回追加轮次后的消息增量和最终会话快照
          content:
            text/event-stream:
              schema:
                type: string
              examples:
                appendTurnStream:
                  summary: 流式追加轮次事件序列
                  value: |
                    event: status
                    data: {"phase":"planning","message":"Planning the import conversation."}

                    event: status
                    data: {"phase":"replying","message":"Preparing the assistant reply."}

                    event: message
                    data: {"actorType":"AGENT","delta":"Use HEADER_TOKEN auth and publish after import."}

                    event: session
                    data: {"sessionId":"session-001","status":"WAITING_FOR_CONFIRMATION","documentSource":"https://docs.example.com/openapi.yaml","documentSummary":"OpenAPI summary","importIntent":"Import weather API","publisherDisplayName":"Console Operator","currentPlanVersion":2,"confirmedPlanVersion":null,"latestRunId":null,"currentPlan":{"version":2,"executable":true,"summary":"Import weather API with HEADER_TOKEN auth and publish after import.","clarificationQuestions":[],"clarificationItems":[],"categoryPlans":[],"assetPlans":[]},"turns":[{"turnId":"turn-001","actorType":"USER","message":"Import weather API","planVersion":null,"createdAt":"2026-05-18T12:00:00Z"},{"turnId":"turn-002","actorType":"AGENT","message":"Which auth scheme should be used for upstream requests?","planVersion":1,"createdAt":"2026-05-18T12:00:01Z"},{"turnId":"turn-003","actorType":"USER","message":"Use HEADER_TOKEN auth and publish after import.","planVersion":1,"createdAt":"2026-05-18T12:03:00Z"},{"turnId":"turn-004","actorType":"AGENT","message":"Understood. The plan is now executable.","planVersion":2,"createdAt":"2026-05-18T12:03:01Z"}],"createdAt":"2026-05-18T12:00:00Z","updatedAt":"2026-05-18T12:03:01Z"}

                    event: done
                    data: {"phase":"completed"}
        '404':
          description: 会话不存在或不属于当前用户
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResp'

  /current-user/import-agent/sessions/{sessionId}/confirm:
    patch:
      summary: 确认当前用户导入计划版本
      operationId: confirmImportPlan
      tags:
        - CurrentUserImportAgent
      parameters:
        - name: sessionId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ConfirmImportAgentPlanReq'
      responses:
        '200':
          description: 计划确认成功，并返回刷新后的会话详情
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiImportAgentSessionResp'
        '400':
          description: 计划版本不可确认
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResp'
        '404':
          description: 会话不存在或不属于当前用户
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResp'

  /current-user/import-agent/sessions/{sessionId}/runs:
    post:
      summary: 启动当前用户导入执行批次
      operationId: startImportRun
      tags:
        - CurrentUserImportAgent
      parameters:
        - name: sessionId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/StartImportAgentRunReq'
      responses:
        '201':
          description: 执行批次已创建
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiImportAgentRunResp'
        '400':
          description: 计划未确认或不可执行
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResp'
        '404':
          description: 会话不存在或不属于当前用户
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResp'

  /current-user/import-agent/runs/{runId}:
    get:
      summary: 查询当前用户导入执行批次详情
      operationId: getImportRun
      tags:
        - CurrentUserImportAgent
      parameters:
        - name: runId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: 执行批次详情
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiImportAgentRunResp'
        '404':
          description: 执行批次不存在或不属于当前用户
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResp'

components:
  schemas:
    CreateImportAgentSessionReq:
      type: object
      required:
        - importIntent
      properties:
        documentSource:
          type: string
          maxLength: 1024
          description: 文档来源，可为 URL、文件标识或外部来源说明
        documentSummary:
          type: string
          maxLength: 64000
          description: 用户提供的文档摘要或预解析内容
        importIntent:
          type: string
          minLength: 1
          maxLength: 2000
          description: 用户导入意图、目标约束或补充说明
        publisherDisplayName:
          type: string
          maxLength: 128
          description: 执行导入时使用的发布者展示名快照，未提供时回退当前用户

    AppendImportAgentTurnReq:
      type: object
      properties:
        message:
          type: string
          maxLength: 64000
          description: 当前用户对导入计划的补充约束、澄清信息或修正意见

        clarificationAnswers:
          type: array
          description: 结构化澄清答案，会在下一次规划前确定性写入当前计划；客户端可以不带 message 仅提交答案。
          items:
            $ref: '#/components/schemas/ImportAgentClarificationAnswerReq'

    ImportAgentClarificationAnswerReq:
      type: object
      properties:
        clarificationId:
          type: string
          maxLength: 256
          description: 当前计划返回的稳定澄清项 ID。
        targetPath:
          type: string
          maxLength: 512
          description: 类 JSON Pointer 的目标路径，例如 /assetPlans/0/authConfig。
        fieldKey:
          type: string
          maxLength: 128
          description: 标准化目标字段 key。
        value:
          type: string
          maxLength: 64000
          description: 用户提交的答案值。

    ConfirmImportAgentPlanReq:
      type: object
      required:
        - planVersion
      properties:
        planVersion:
          type: integer
          minimum: 1
          description: 待确认的计划版本号

    StartImportAgentRunReq:
      type: object
      required:
        - planVersion
      properties:
        planVersion:
          type: integer
          minimum: 1
          description: 待执行的已确认计划版本号

    ApiImportAgentSessionResp:
      type: object
      properties:
        sessionId:
          type: string
        status:
          type: string
          enum:
            - WAITING_FOR_PLAN
            - WAITING_FOR_CONFIRMATION
            - WAITING_FOR_CLARIFICATION
            - CONFIRMED
            - EXECUTING
            - COMPLETED
            - FAILED
        documentSource:
          type: string
          nullable: true
        documentSummary:
          type: string
          nullable: true
        importIntent:
          type: string
        publisherDisplayName:
          type: string
        currentPlanVersion:
          type: integer
          nullable: true
        confirmedPlanVersion:
          type: integer
          nullable: true
        latestRunId:
          type: string
          nullable: true
        currentPlan:
          $ref: '#/components/schemas/ImportAgentPlanResp'
        turns:
          type: array
          items:
            $ref: '#/components/schemas/ImportAgentTurnResp'
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    ImportAgentPlanResp:
      type: object
      properties:
        version:
          type: integer
        executable:
          type: boolean
        summary:
          type: string
        clarificationQuestions:
          type: array
          items:
            type: string
        clarificationItems:
          type: array
          description: 面向引导式客户端的结构化澄清项；旧客户端可以继续使用 clarificationQuestions。
          items:
            $ref: '#/components/schemas/ImportAgentClarificationItemResp'
        categoryPlans:
          type: array
          items:
            $ref: '#/components/schemas/ImportCategoryPlanResp'
        assetPlans:
          type: array
          items:
            $ref: '#/components/schemas/ImportAssetPlanResp'

    ImportAgentClarificationItemResp:
      type: object
      properties:
        id:
          type: string
        targetPath:
          type: string
          description: 类 JSON Pointer 的计划目标路径，例如 /assetPlans/0/authConfig。
        fieldKey:
          type: string
        label:
          type: string
        description:
          type: string
          nullable: true
        inputType:
          type: string
          enum:
            - TEXT
            - SELECT
            - BOOLEAN
            - MULTILINE
        required:
          type: boolean
        options:
          type: array
          items:
            $ref: '#/components/schemas/ImportAgentClarificationOptionResp'
        currentValue:
          type: string
          nullable: true
        defaultValue:
          type: string
          nullable: true
          description: Agent 基于当前文档、历史计划或低风险推断给出的推荐默认答案；客户端必须在用户确认后才提交为 clarificationAnswers。
        defaultLabel:
          type: string
          nullable: true
          description: 推荐默认答案的展示标签，适用于 SELECT、BOOLEAN 等控件。
        defaultSource:
          type: string
          nullable: true
          description: 推荐默认答案来源。
          enum:
            - DOCUMENT
            - INFERRED_FROM_URL
            - CURRENT_PLAN
            - AGENT_HEURISTIC
        defaultConfidence:
          type: string
          nullable: true
          description: 推荐默认答案置信度。
          enum:
            - HIGH
            - MEDIUM
            - LOW

    ImportAgentClarificationOptionResp:
      type: object
      properties:
        value:
          type: string
        label:
          type: string

    ImportCategoryPlanResp:
      type: object
      properties:
        categoryCode:
          type: string
        categoryName:
          type: string
        action:
          type: string
          enum:
            - USE_EXISTING
            - CREATE_IF_MISSING

    ImportAssetPlanResp:
      type: object
      properties:
        apiCode:
          type: string
        assetName:
          type: string
        assetType:
          type: string
          enum:
            - STANDARD_API
            - AI_API
        categoryCode:
          type: string
          nullable: true
        requestMethod:
          type: string
          nullable: true
        upstreamUrl:
          type: string
          nullable: true
        authScheme:
          type: string
          nullable: true
        authConfig:
          type: string
          nullable: true
        requestTemplate:
          type: string
          nullable: true
        requestExample:
          type: string
          nullable: true
        responseExample:
          type: string
          nullable: true
        requestJsonSchema:
          type: string
          nullable: true
        responseJsonSchema:
          type: string
          nullable: true
        publishAfterImport:
          type: boolean
        asyncTaskConfig:
          $ref: '#/components/schemas/AsyncTaskConfig'
        aiProfile:
          $ref: '#/components/schemas/ImportAiProfileResp'

    AsyncTaskConfig:
      type: object
      nullable: true
      description: API 资产的异步任务查询配置。为空表示导入计划不声明任务查询通道。
      properties:
        enabled:
          type: boolean
          description: 是否启用该资产的异步任务查询通道
        queryMethod:
          type: string
          description: 上游任务查询请求方法。一期推荐 GET。
          enum:
            - GET
            - POST
        queryUrlTemplate:
          type: string
          nullable: true
          description: 上游任务查询 URL 模板，启用时必须包含 `{taskId}` 占位符
          example: https://provider.example.com/v1/tasks/{taskId}
        authMode:
          type: string
          description: 任务查询鉴权模式。SAME_AS_SUBMIT 表示复用资产上游鉴权配置。
          enum:
            - SAME_AS_SUBMIT
            - OVERRIDE
        authScheme:
          type: string
          nullable: true
          description: authMode 为 OVERRIDE 时使用的任务查询鉴权方案
          enum:
            - NONE
            - HEADER_TOKEN
            - QUERY_TOKEN
        authConfig:
          type: string
          nullable: true
          description: authMode 为 OVERRIDE 时使用的任务查询鉴权配置
        statusPath:
          type: string
          nullable: true
          description: 上游任务状态字段 JSONPath
        resultPath:
          type: string
          nullable: true
          description: 上游任务结果字段 JSONPath
        errorPath:
          type: string
          nullable: true
          description: 上游任务错误字段 JSONPath

    ImportAiProfileResp:
      type: object
      nullable: true
      properties:
        provider:
          type: string
        model:
          type: string
        streamingSupported:
          type: boolean
        capabilityTags:
          type: array
          items:
            type: string

    ImportAgentTurnResp:
      type: object
      properties:
        turnId:
          type: string
        actorType:
          type: string
          enum:
            - USER
            - AGENT
        message:
          type: string
        planVersion:
          type: integer
          nullable: true
        createdAt:
          type: string
          format: date-time

    ImportAgentStreamStatusEvent:
      type: object
      properties:
        phase:
          type: string
          enum:
            - planning
            - replying
            - completed
        message:
          type: string
          nullable: true

    ImportAgentStreamMessageEvent:
      type: object
      properties:
        actorType:
          type: string
          enum:
            - USER
            - AGENT
        delta:
          type: string

    ImportAgentStreamErrorEvent:
      type: object
      properties:
        code:
          type: string
          nullable: true
        message:
          type: string

    ApiImportAgentRunResp:
      type: object
      properties:
        runId:
          type: string
        sessionId:
          type: string
        planVersion:
          type: integer
        status:
          type: string
          enum:
            - RUNNING
            - SUCCEEDED
            - PARTIALLY_FAILED
            - FAILED
        summary:
          type: string
          nullable: true
        failureReason:
          type: string
          nullable: true
        affectedApiCodes:
          type: array
          items:
            type: string
        stepResults:
          type: array
          items:
            $ref: '#/components/schemas/ImportStepResultResp'
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    ImportStepResultResp:
      type: object
      properties:
        stepType:
          type: string
          enum:
            - ENSURE_CATEGORY
            - REGISTER_ASSET
            - REVISE_ASSET
            - ATTACH_AI_PROFILE
            - PUBLISH_ASSET
        targetRef:
          type: string
        status:
          type: string
          enum:
            - SUCCEEDED
            - FAILED
        message:
          type: string
          nullable: true

    ErrorResp:
      type: object
      properties:
        code:
          type: string
        message:
          type: string
